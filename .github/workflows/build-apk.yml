name: Build TVBox APK (arm64 Generic Normal only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      # 只构建 arm64 + generic + normal 的 debug 版
      - name: Build Debug APK (arm64GenericNormal)
        run: ./gradlew assembleArm64GenericNormalDebug --stacktrace --info

      # 只构建 arm64 + generic + normal 的 release 版 (unsigned)
      - name: Build Release APK (arm64GenericNormal)
        run: ./gradlew assembleArm64GenericNormalRelease --stacktrace --info --build-cache --parallel

      # 列出生成的 APK（调试用）
      - name: List generated APKs
        if: always()
        run: |
          echo "Listing all APKs:"
          find app/build/outputs/apk -name "*.apk" -print || true
          ls -laR app/build/outputs/apk || true

      # 上传 debug 版
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-debug-arm64-generic-normal
          path: app/build/outputs/apk/arm64/generic/normal/debug/*.apk
          retention-days: 7
          if-no-files-found: error  # 如果没找到就报错提醒

      # 上传 release 版
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-release-arm64-generic-normal
          path: app/build/outputs/apk/arm64/generic/normal/release/*.apk
          retention-days: 7
          if-no-files-found: error
