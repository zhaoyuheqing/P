name: Build TVBox LiveOnly Debug (arm64)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean previous builds
        run: ./gradlew clean --no-daemon

      - name: Build arm64 debug (optimized)
        id: build_step
        run: |
          ./gradlew assembleArm64GenericNormalDebug \
            --no-daemon \
            --parallel \
            --configure-on-demand \
            --max-workers=4 \
            --stacktrace \
            --info > compile_log.txt 2>&1

      - name: Find and rename APK (only on success)
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs -type f -name "*arm64*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            mv "$APK_PATH" TVBox-LiveOnly-debug-arm64.apk
            echo "APK renamed and ready for upload:"
            ls -lh TVBox-LiveOnly-debug-arm64.apk
          else
            echo "APK not found even though build reports success"
            exit 1
          fi

      - name: On failure - Print critical errors to console & generate summary file
        if: failure()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚨 BUILD FAILED - CRITICAL ERROR SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          echo "Build time: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          echo "1. Lines containing 'error:' (±5 lines context)"
          echo "---------------------------------------------"
          grep -i -C 5 "error:" compile_log.txt || echo "(no 'error:' lines found)"
          echo ""

          echo "2. Failed task information"
          echo "-------------------------"
          grep -B 10 -A 30 "Execution failed for task" compile_log.txt || echo "(no failed task messages found)"
          echo ""

          echo "3. Errors related to key files (LivePlayActivity / ApiConfig / Live)"
          echo "---------------------------------------------------------------"
          grep -i -C 8 "LivePlayActivity.java\|ApiConfig.java\|Live" compile_log.txt || echo "(no matches in key files)"
          echo ""

          echo "4. Last 200 lines of build log (quick view)"
          echo "------------------------------------------"
          echo "(full 400 lines saved in artifact)"
          tail -n 200 compile_log.txt
          echo ""

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Full details saved → build-log-error-summary.txt"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # 生成供下载的完整版文件
          {
            echo "=== BUILD FAILED - FULL ERROR SUMMARY ==="
            echo "Build date: $(date '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "1. Lines containing 'error:' (with ±5 lines context)"
            grep -i -C 5 "error:" compile_log.txt 2>/dev/null || echo "No 'error:' lines found"
            echo ""
            echo "2. Failed task information"
            grep -B 10 -A 30 "Execution failed for task" compile_log.txt 2>/dev/null || echo "No failed task messages found"
            echo ""
            echo "3. Errors related to key files (LivePlayActivity / ApiConfig / Live)"
            grep -i -C 8 "LivePlayActivity.java\|ApiConfig.java\|Live" compile_log.txt 2>/dev/null || echo "No matches in key files"
            echo ""
            echo "4. Last 400 lines of build log (most important part)"
            tail -n 400 compile_log.txt
            echo ""
            echo "=== END OF ERROR SUMMARY ==="
          } > build-log-error-summary.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-LiveOnly-debug-arm64
          path: |
            TVBox-LiveOnly-debug-arm64.apk
            build-log-error-summary.txt
            # compile_log.txt     # 调试时可临时打开，生产环境建议注释掉以减少上传体积
          if-no-files-found: warn
          retention-days: 7
