name: Build TVBox APK - Single Debug Variant (arm64 generic normal debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean previous builds
        run: ./gradlew clean

      # 构建 debug 版，保存完整日志（失败时 workflow 会停止）
      - name: Assemble single debug variant
        run: ./gradlew assembleArm64GenericNormalDebug --stacktrace --info --debug > compile_log.txt 2>&1

      # 打印所有生成的 APK 文件路径（用于确认位置）
      - name: Print all generated APK locations
        if: always()
        run: |
          echo "======================================"
          echo "寻找所有 .apk 文件（完整路径）："
          find app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "未找到任何 .apk 文件"
          echo ""
          echo "======================================"
          echo "outputs/apk 目录结构："
          ls -laR app/build/outputs/apk 2>/dev/null || echo "目录不存在或为空"
          echo "======================================"

      # 失败时打印关键错误信息（现在会正常触发）
      - name: Extract & Print Compile Errors (on failure)
        if: failure()
        run: |
          echo "=== BUILD FAILED - ERROR SUMMARY (copy all below to Grok) ==="
          echo ""
          echo "1. All lines containing 'error:' (javac compilation errors):"
          grep -i -B 5 -A 30 "error:" compile_log.txt | head -n 100 || echo "No 'error:' lines found"
          echo ""
          echo "2. Failed task context:"
          grep -B 10 -A 30 "failed for task" compile_log.txt || echo "No failed task found"
          echo ""
          echo "3. Errors related to HomeActivity.java:"
          grep -i -B 5 -A 30 "HomeActivity.java" compile_log.txt || echo "No HomeActivity errors found"
          echo ""
          echo "4. Last 200 lines of log (errors usually here):"
          tail -n 200 compile_log.txt
          echo ""
          echo "=== END OF ERROR SUMMARY ==="

      # 递归上传 APK（成功时有效）
      - name: Upload debug APK (recursive search)
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-debug-arm64-generic-normal
          path: app/build/outputs/**/*.apk
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6
