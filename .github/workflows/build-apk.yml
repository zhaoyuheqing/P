name: Build TVBox LiveOnly Debug (arm64)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 只取最新 commit，够用且更快

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean previous builds
        run: ./gradlew clean --no-daemon

      - name: Build arm64 debug (optimized)
        id: build_step
        run: |
          ./gradlew assembleArm64GenericNormalDebug \
            --no-daemon \
            --parallel \
            --configure-on-demand \
            --max-workers=4 \
            --stacktrace \
            --info > compile_log.txt 2>&1 || true   # 失败也继续执行下一步

      - name: Print APK locations (always)
        if: always()
        run: |
          echo "======================================"
          echo "寻找所有生成的 .apk 文件："
          find app/build/outputs -type f -name "*.apk" -exec ls -lh {} \; || echo "未找到 APK"
          echo ""
          echo "outputs/apk 目录完整结构："
          ls -laR app/build/outputs/apk 2>/dev/null || echo "目录不存在"
          echo "======================================"

      - name: Show Build Log Summary (always, but highlight errors)
        if: always()
        run: |
          echo "=== BUILD LOG SUMMARY ==="
          echo ""
          echo "1. 所有包含 'error:' 的行（编译错误）："
          grep -i -C 5 "error:" compile_log.txt | head -n 150 || echo "未找到 error: 行"
          echo ""
          echo "2. 失败的任务上下文（Failed task）："
          grep -B 15 -A 30 "Execution failed for task" compile_log.txt || echo "未找到失败任务"
          echo ""
          echo "3. 与核心文件相关的错误（LivePlayActivity / ApiConfig）："
          grep -i -C 8 "LivePlayActivity.java\|ApiConfig.java" compile_log.txt || echo "未找到相关文件错误"
          echo ""
          echo "4. 最后 300 行日志（通常包含最终原因）："
          tail -n 300 compile_log.txt
          echo ""
          echo "=== SUMMARY END ==="

      - name: Upload debug APK
        if: success() || failure()  # 即使失败也尝试上传日志相关文件
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-LiveOnly-debug-arm64
          path: |
            app/build/outputs/**/*.apk
            compile_log.txt
          if-no-files-found: warn
          retention-days: 7
