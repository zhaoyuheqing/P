name: Build TVBox APK - Single Variant (arm64 generic normal release)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean previous builds
        run: ./gradlew clean

      # 只构建一个指定的变体：arm64 + generic + normal + release
      - name: Assemble single release variant
        run: ./gradlew assembleArm64GenericNormalRelease --stacktrace --info --build-cache --parallel

      # 打印所有生成的 APK 文件路径（强烈推荐，用于确认实际位置）
      - name: Print all generated APK locations
        if: always()
        run: |
          echo "======================================"
          echo "寻找所有 .apk 文件（完整路径）："
          find app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "未找到任何 .apk 文件"
          echo ""
          echo "======================================"
          echo "outputs/apk 目录结构："
          ls -laR app/build/outputs/apk 2>/dev/null || echo "目录不存在或为空"
          echo "======================================"

      # 递归查找并上传 release APK（最稳妥的方式）
      - name: Upload release APK (recursive search)
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-release-arm64-generic-normal
          path: |
            app/build/outputs/**/*.apk
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      # 如果你也想要 debug 版，可以取消下面注释
      # - name: Assemble single debug variant
      #   run: ./gradlew assembleArm64GenericNormalDebug --stacktrace --info --build-cache --parallel

      # - name: Upload debug APK (recursive)
