name: Build TVBox LiveOnly Debug (arm64)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean previous builds
        run: ./gradlew clean --no-daemon

      - name: Build arm64 debug (optimized)
        id: build_step
        run: |
          ./gradlew assembleArm64GenericNormalDebug \
            --no-daemon \
            --parallel \
            --configure-on-demand \
            --max-workers=4 \
            --stacktrace \
            --info > compile_log.txt 2>&1

      - name: Find and rename APK (only on success)
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs -type f -name "*arm64*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            mv "$APK_PATH" TVBox-LiveOnly-debug-arm64.apk
            echo "APK renamed and ready for upload"
            ls -lh TVBox-LiveOnly-debug-arm64.apk
          else
            echo "APK not found even though build reports success"
            exit 1
          fi

      - name: Generate error summary log (only on failure)
        if: failure()
        run: |
          echo "=== BUILD FAILED - ERROR SUMMARY ===" > build-log-error-summary.txt
          echo "" >> build-log-error-summary.txt
          echo "Build date: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> build-log-error-summary.txt
          echo "" >> build-log-error-summary.txt
          
          echo "1. Lines containing 'error:' (with context)" >> build-log-error-summary.txt
          grep -i -C 5 "error:" compile_log.txt >> build-log-error-summary.txt 2>/dev/null || echo "No 'error:' lines found" >> build-log-error-summary.txt
          echo "" >> build-log-error-summary.txt
          
          echo "2. Failed task information" >> build-log-error-summary.txt
          grep -B 10 -A 30 "Execution failed for task" compile_log.txt >> build-log-error-summary.txt 2>/dev/null || echo "No failed task messages found" >> build-log-error-summary.txt
          echo "" >> build-log-error-summary.txt
          
          echo "3. Errors related to key files (LivePlayActivity / ApiConfig / Live)" >> build-log-error-summary.txt
          grep -i -C 8 "LivePlayActivity.java\|ApiConfig.java\|Live" compile_log.txt >> build-log-error-summary.txt 2>/dev/null || echo "No matches in key files" >> build-log-error-summary.txt
          echo "" >> build-log-error-summary.txt
          
          echo "4. Last 400 lines of build log (most important part)" >> build-log-error-summary.txt
          tail -n 400 compile_log.txt >> build-log-error-summary.txt 2>/dev/null
          echo "" >> build-log-error-summary.txt
          echo "=== END OF ERROR SUMMARY ===" >> build-log-error-summary.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-LiveOnly-debug-arm64
          path: |
            TVBox-LiveOnly-debug-arm64.apk
            build-log-error-summary.txt
            compile_log.txt   # 可选：保留完整日志供调试，生产环境可删除此行
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6
