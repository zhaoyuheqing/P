name: Build TVBox APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Build Release Unsigned APK
        run: ./gradlew assembleRelease --stacktrace --info --build-cache --parallel

      # 列出所有生成的 APK 路径（debug 用，方便看日志）
      - name: List all generated APKs
        if: always()
        run: |
          echo "Listing APKs:"
          find app/build/outputs/apk -name "*.apk" || true
          ls -laR app/build/outputs/apk || true

      # 上传所有找到的 APK（递归通配）
      - name: Upload All Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-debug-apks
          path: app/build/outputs/apk/**/*.apk   # ** 递归所有子目录
          retention-days: 7
          if-no-files-found: warn

      - name: Upload All Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-release-apks
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: warn
